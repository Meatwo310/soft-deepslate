name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read release version
        run: |
          RELEASE_VERSION=$(tr -d '[:space:]' < version.txt)
          if [[ -z "$RELEASE_VERSION" ]]; then
            echo "::error::Could not read version.txt."
            exit 1
          fi
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Ensure release tag does not exist
        run: |
          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "::error::Release tag $RELEASE_TAG already exists."
            exit 1
          fi

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Read mod name
        run: |
          chmod u+x ./gradlew
          MOD_NAME=$(./gradlew -q properties --property modName | awk -F': ' '/^modName: / { print $2; exit }')
          if [[ -z "$MOD_NAME" ]]; then
            echo "::error::Could not read modName from ./gradlew properties."
            exit 1
          fi
          echo "MOD_NAME=$MOD_NAME" >> "$GITHUB_ENV"

      - name: Detect platform projects
        id: detect
        run: |
          chmod u+x ./gradlew
          ./gradlew --configuration-cache --no-daemon writeCiBuildMatrix
          JSON=$(<build/ci/build-matrix.json)
          BUILD_TASKS=$(jq -r '.[] | ":\(.subproject):build"' <<< "$JSON" | xargs)
          if [[ -z "$BUILD_TASKS" ]]; then
            echo "::error::No platform projects were detected."
            exit 1
          fi
          echo "build_tasks=$BUILD_TASKS" >> "$GITHUB_OUTPUT"
          echo "::group::Platform projects"
          jq . <<< "$JSON"
          echo "::endgroup::"

      - name: Build platform projects
        run: ./gradlew ${{ steps.detect.outputs.build_tasks }}

      - name: Collect release jars
        run: |
          mkdir -p build/release/libs
          while IFS= read -r subproject; do
            find "$subproject/build/libs" -maxdepth 1 -type f -name '*.jar' \
              ! -name '*-sources.jar' \
              ! -name '*-javadoc.jar' \
              ! -name '*-dev.jar' \
              -exec cp {} build/release/libs/ \;
          done < <(jq -r '.[].subproject' build/ci/build-matrix.json)
          test -n "$(find build/release/libs -maxdepth 1 -type f -name '*.jar' -print -quit)"
          ls -la build/release/libs

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate release notes
        run: |
          PREVIOUS_TAG=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n 1)
          if [[ -z "$PREVIOUS_TAG" ]]; then
            echo "First release of $MOD_NAME." > build/release/RELEASE_NOTES.md
          else
            git cliff "$PREVIOUS_TAG..HEAD" --unreleased --tag "$RELEASE_TAG" --strip all --output build/release/RELEASE_NOTES.md
          fi

      - name: Tag and push latest commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: build/release/RELEASE_NOTES.md
          files: build/release/libs/*.jar
