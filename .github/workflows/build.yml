name: Build

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect subprojects from settings.gradle.kts
        id: detect
        run: |
          JSON=$(grep '^include(' settings.gradle.kts \
            | sed 's/include("//;s/")//' \
            | jq -R . | jq -sc .)
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Subprojects: $JSON"

  build:
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        subproject: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'jetbrains'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: chmod u+x ./gradlew && ./gradlew ":${{ matrix.subproject }}:build"

      - name: Run Game Tests
        if: "endsWith(matrix.subproject, 'neo') || endsWith(matrix.subproject, 'forge')"
        run: ./gradlew ":${{ matrix.subproject }}:runGameTestServer"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: "!endsWith(matrix.subproject, 'common')"
        with:
          path: ${{ matrix.subproject }}/build/libs/
          name: artifact-${{ matrix.subproject }}
